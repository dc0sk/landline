# landline — CI pipeline.
#
# The `docs` job mirrors the local pre-commit/pre-push hooks (frontmatter check +
# traceability gate). The `rust` job mirrors `cargo xtask ci` (fmt, clippy at
# pedantic via -D warnings, tests) and cross-compiles the aarch64 Raspberry Pi
# reference target (NFR-DEPLOY-01). Both must pass on pushes and PRs to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    name: Docs & Traceability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Docs frontmatter check
        run: |
          set -eu
          REQUIRED_KEYS="title status version updated authors"
          failed=0
          for f in $(git ls-files 'docs/**/*.md' 'docs/*.md'); do
            [ -f "$f" ] || continue
            first_line=$(head -n 1 "$f")
            if [ "$first_line" != "---" ]; then
              echo "FAIL: $f does not start with a '---' frontmatter block" >&2
              failed=1
              continue
            fi
            frontmatter=$(awk 'NR==1{next} /^---[[:space:]]*$/{exit} {print}' "$f")
            for key in $REQUIRED_KEYS; do
              if ! printf '%s\n' "$frontmatter" | grep -Eq "^${key}:"; then
                echo "FAIL: $f is missing required frontmatter key '${key}'" >&2
                failed=1
              fi
            done
          done
          [ "$failed" -eq 0 ] || { echo "docs frontmatter check failed" >&2; exit 1; }

      - name: Traceability gate (R3/R4)
        run: python3 scripts/trace-gate.py

  rust:
    name: Format, Lint, Test, Audit & Cross-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      # Workspace lints set clippy::pedantic = warn; -D warnings enforces
      # NFR-MAINT-01 (pass Clippy pedantic without warnings).
      - name: clippy (pedantic)
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      # Verify the opt-in libopus codec (native/C) builds and round-trips.
      - name: Install libopus + ALSA
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev pkg-config
      - name: Test opus feature
        run: cargo test -p landline-backend --features opus
      # audio-device links ALSA and opens real devices at runtime (none in CI),
      # so build + clippy only — behavioural validation is HIL on the Pi.
      - name: Build + lint device features
        run: |
          cargo clippy -p landline-backend --features audio-device --all-targets -- -D warnings
          cargo build -p landline-backend --features audio-device
          cargo clippy -p landline-backend --features gpio-device --all-targets -- -D warnings
          cargo build -p landline-backend --features gpio-device
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
      # Cross-compile the Raspberry Pi reference target (A3, NFR-DEPLOY-01).
      - name: Install aarch64 cross-linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross-build (aarch64 Raspberry Pi)
        run: cargo build --release -p landline-backend --target aarch64-unknown-linux-gnu

  dockerfile:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/container/Dockerfile

  frontend:
    name: Frontend Typecheck, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
