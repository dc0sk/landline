# landline backend configuration (single-file source, NFR-DEPLOY-04).
# Copy to ~/.config/landline/config.toml (or point $LANDLINE_CONFIG at it).
#
# This file is secret-free by design: token secrets and TLS private keys live in
# separate 0600 files (NFR-SEC-03), never here and never in logs or URLs
# (NFR-SEC-12).

[server]
# Bind address. Default is loopback; expose beyond the host only over a private
# tunnel interface (WireGuard/Tailscale), not a public 0.0.0.0 bind (NFR-SEC-13).
bind = "127.0.0.1"
port = 8443

[auth]
# Short-lived access tokens (FR-AUTH-02) plus longer-lived refresh (FR-AUTH-03).
access_ttl_secs = 900     # 15 minutes
refresh_ttl_secs = 86400  # 24 hours

# User accounts. `password_hash` is an argon2 PHC string — never a plaintext
# password (NFR-SEC-12). Generate one with:
#   cargo run -p landline-backend --bin landline-hash -- <password>   # (helper TBD)
# or via the `landline_backend::auth::hash_password` API. Roles: admin | operator | observer.
# [[users]]
# name = "operator"
# role = "operator"
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$c29tZXNhbHQ$<hash>"

[security]
# Per-client rate limit on control endpoints, commands/second (NFR-SEC-04).
rate_limit_per_sec = 10
# Maximum accepted request body size in bytes (NFR-SEC-05).
max_body_bytes = 65536
# CORS origin allowlist (NFR-SEC-06). Empty = no cross-origin requests allowed.
# Set to the exact frontend origin(s), e.g.:
# allowed_origins = ["https://landline.example"]
allowed_origins = []

[audit]
# Durable append-only audit log (ARC-07). Unset = in-memory only (dev). The
# file is written append-only; 30-day retention (FR-AUDIT-03) is enforced by
# deployment log rotation (logrotate/systemd).
# path = "/var/lib/landline/audit.log"
retention_days = 30

[rig]
# hamlib rigctld endpoint (ARC-04). Keep it on loopback / a trusted local link
# (ASM-05); landline is the sole authority for command validation.
host = "127.0.0.1"
port = 4532
# Per-command timeout in milliseconds.
timeout_ms = 2000
# PTT safety timeout (seconds): the server auto-unkeys if PTT is left active this
# long without a refresh (NFR-SEC-07).
ptt_timeout_secs = 120
# Circuit breaker (NFR-REL-02): open after this many consecutive failures, then
# fail fast for the cooldown before retrying.
breaker_threshold = 3
breaker_cooldown_ms = 1000

[gpio]
# Raspberry Pi GPIO control (ARC-08). Disabled by default; enable on Pi targets.
enabled = false
# Only listed pins are reachable; every other pin is inaccessible (NFR-SEC-16).
# Outputs are driven to `safe_state` at startup. direction: in|out, safe_state: low|high.
# [[gpio.pins]]
# pin = 17
# direction = "out"
# safe_state = "low"

[spectrum]
# FFT size (samples per frame); output bins = fft_size / 2 (ARC-06).
fft_size = 1024
# Source sample rate in Hz.
sample_rate_hz = 48000
# Spectrum frame rate in Hz; clamped to 1-10 (FR-SPEC-02, NFR-PERF-05 needs >= 2).
update_rate_hz = 5
# Nominal centre frequency reported with each frame (Hz).
center_hz = 0

[audio]
# Audio pipeline (ARC-05). sample_rate/frame define framing; bitrate is the Opus
# target (FR-AUD-05); jitter_* size the reorder/loss-concealment buffer (FR-AUD-06).
sample_rate_hz = 48000
frame_ms = 20
bitrate_bps = 16000
jitter_target_frames = 3
jitter_max_frames = 10
