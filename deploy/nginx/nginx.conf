# landline — TLS termination + reverse proxy (BL-100/101, NFR-SEC-01).
#
# Enforces HTTPS/WSS: plaintext on :80 is redirected to :443, so the backend is
# never reached over cleartext. Proxies the API/auth and the WebSocket telemetry
# to the loopback backend, and serves the static frontend. The backend itself
# binds loopback (NFR-SEC-13); this proxy is its only public face.

# Redirect all plaintext to HTTPS (NFR-SEC-01: no plaintext).
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name landline.example;   # replace with your host name

    # TLS key must be 0600, owned by the nginx user (NFR-SEC-03).
    ssl_certificate     /etc/landline/tls/fullchain.pem;
    ssl_certificate_key /etc/landline/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers.
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Bound request bodies at the edge too (defence in depth, NFR-SEC-05).
    client_max_body_size 1m;

    # Static frontend (index.html, dist/, styles.css).
    root  /var/www/landline;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend REST API + auth.
    location ~ ^/(api|auth)/ {
        proxy_pass http://127.0.0.1:8443;
        proxy_set_header Host $host;
        # X-Forwarded-For lets the backend rate-limiter key on the real client
        # IP behind the proxy (the Phase-4 hardening follow-up for BL-022).
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket telemetry (WSS at the edge -> ws upstream).
    location = /ws {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }
}
