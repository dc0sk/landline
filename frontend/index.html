<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>landline</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section id="login-view">
        <h1>landline</h1>
        <form id="login-form">
          <label>Name <input id="name" name="name" autocomplete="username" required /></label>
          <label
            >Password
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
          /></label>
          <button type="submit">Sign in</button>
        </form>
        <p id="error" role="alert"></p>
      </section>

      <section id="app-view" hidden>
        <header>
          <span id="who"></span>
          <button id="logout" type="button">Sign out</button>
        </header>

        <section id="rig-panel">
          <div>
            <span>Frequency (Hz):</span>
            <output id="freq-display">—</output>
          </div>
          <form id="freq-form">
            <label
              >Set frequency
              <input
                id="freq-input"
                type="number"
                min="1"
                step="1"
                inputmode="numeric"
                required
            /></label>
            <button type="submit">Set</button>
          </form>

          <div>
            <label>Mode <select id="mode-select"></select></label>
          </div>

          <div>
            <button id="ptt-button" type="button" aria-pressed="false">PTT (transmit)</button>
          </div>

          <div>
            <span>S-meter:</span>
            <output id="smeter-display">—</output>
          </div>

          <p id="rig-error" role="alert"></p>
        </section>

        <section id="spectrum-panel">
          <h2>Spectrum</h2>
          <canvas id="waterfall" width="256" height="160"></canvas>
        </section>
      </section>
    </main>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
